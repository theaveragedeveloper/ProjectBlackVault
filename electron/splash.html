<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project Black Vault</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:     #08090f;
      --surface:#0e0f18;
      --border: #1a1c2e;
      --amber:  #d4a843;
      --amber2: #b88a2e;
      --text:   #c8cad8;
      --muted:  #4a4d65;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Courier New', Courier, monospace;
      user-select: none;
      -webkit-user-select: none;
      overflow: hidden;
    }

    /* Dot-grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(circle, #1e2030 1px, transparent 1px);
      background-size: 22px 22px;
      opacity: 0.45;
      pointer-events: none;
    }

    .container {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      padding: 32px 40px;
      gap: 0;
    }

    /* Lock icon */
    .icon {
      width: 44px;
      height: 44px;
      margin-bottom: 18px;
      opacity: 0.9;
    }

    .icon-body {
      fill: none;
      stroke: var(--amber);
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .title {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--amber);
      text-shadow: 0 0 18px rgba(212, 168, 67, 0.35);
      margin-bottom: 6px;
    }

    .subtitle {
      font-size: 9.5px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 28px;
    }

    /* Status line */
    .status-line {
      font-size: 10px;
      letter-spacing: 0.1em;
      color: #6b7090;
      margin-bottom: 14px;
      height: 14px;
    }

    .cursor {
      display: inline-block;
      width: 7px;
      height: 11px;
      background: var(--amber);
      vertical-align: middle;
      margin-left: 3px;
      animation: blink 1s step-end infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    /* Progress bar */
    .progress-track {
      width: 240px;
      height: 2px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: 28px;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--amber2), var(--amber));
      border-radius: 2px;
      animation: fill 2.6s cubic-bezier(0.4, 0, 0.2, 1) forwards;
      box-shadow: 0 0 8px rgba(212, 168, 67, 0.5);
    }

    @keyframes fill {
      0%   { width: 0%; }
      40%  { width: 55%; }
      70%  { width: 78%; }
      90%  { width: 91%; }
      100% { width: 97%; }
    }

    /* Corner decorations */
    .corner {
      position: absolute;
      width: 14px;
      height: 14px;
      border-color: var(--border);
      border-style: solid;
      opacity: 0.6;
    }
    .corner-tl { top: 14px; left: 14px; border-width: 1px 0 0 1px; }
    .corner-tr { top: 14px; right: 14px; border-width: 1px 1px 0 0; }
    .corner-bl { bottom: 14px; left: 14px; border-width: 0 0 1px 1px; }
    .corner-br { bottom: 14px; right: 14px; border-width: 0 1px 1px 0; }

    /* Footer */
    .footer {
      font-size: 9px;
      color: var(--muted);
      letter-spacing: 0.08em;
      opacity: 0.7;
    }
  </style>
</head>
<body>
  <div class="corner corner-tl"></div>
  <div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div>
  <div class="corner corner-br"></div>

  <div class="container">
    <!-- Vault lock icon -->
    <svg class="icon" viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="8" y="20" width="28" height="18" rx="3" class="icon-body"/>
      <path d="M14 20v-6a8 8 0 0 1 16 0v6" class="icon-body"/>
      <circle cx="22" cy="30" r="3" class="icon-body"/>
      <line x1="22" y1="33" x2="22" y2="36" class="icon-body"/>
    </svg>

    <div class="title">Project Black Vault</div>
    <div class="subtitle">Secure Firearms Inventory</div>

    <div class="status-line" id="status">
      INITIALIZING SECURE ENVIRONMENT<span class="cursor"></span>
    </div>

    <div class="progress-track">
      <div class="progress-fill"></div>
    </div>

    <div class="footer" id="ver">v—</div>
  </div>

  <script>
    // Cycle status messages
    const messages = [
      'INITIALIZING SECURE ENVIRONMENT',
      'LOADING VAULT DATABASE',
      'STARTING LOCAL SERVER',
      'VERIFYING INTEGRITY',
      'ESTABLISHING SECURE CONNECTION',
    ];
    let idx = 0;
    const statusEl = document.getElementById('status');
    const cursor = '<span class="cursor"></span>';

    setInterval(() => {
      idx = (idx + 1) % messages.length;
      statusEl.innerHTML = messages[idx] + cursor;
    }, 1600);

    // Version injected via URL query param from main process (?v=x.y.z)
    try {
      const v = new URLSearchParams(location.search).get('v');
      if (v) document.getElementById('ver').textContent = 'v' + v;
    } catch (_) {}
  </script>
</body>
</html>
