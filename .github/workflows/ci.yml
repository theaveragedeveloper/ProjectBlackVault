name: CI

on:
  push:
    branches:
      - main
      - V1-Public-release-check
      - public-release-prep
  pull_request:
  workflow_dispatch:

jobs:
  quality:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: file:./prisma/dev.db
      SESSION_COOKIE_SECURE: auto
      ALLOW_ENCRYPTION_KEY_EXPORT: "false"
      NODE_ENV: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Validate runtime configuration
        run: npm run validate:runtime

      - name: Apply migrations
        run: npx prisma migrate deploy

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Tests
        run: npm run test

      - name: Build
        run: npm run build
