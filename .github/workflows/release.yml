name: Build & Release Launcher

on:
  push:
    branches: [main]
    paths:
      - "launcher/**"
      - ".github/workflows/release.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      release_title: ${{ steps.version.outputs.release_title }}
      release_notes: ${{ steps.version.outputs.release_notes }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve release metadata
        id: version
        run: |
          VERSION=$(node -p "require('./launcher/package.json').version")
          TAG="v${VERSION}"
          TITLE="ProjectBlackVault Launcher ${TAG}"
          NOTES="Desktop launcher for ProjectBlackVault. Requires Docker Desktop."

          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "release_title=${TITLE}" >> "$GITHUB_OUTPUT"
          echo "release_notes=${NOTES}" >> "$GITHUB_OUTPUT"

      - name: Create or update release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          TITLE="${{ steps.version.outputs.release_title }}"
          NOTES="${{ steps.version.outputs.release_notes }}"

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" --title "$TITLE" --notes "$NOTES" --latest
          else
            gh release create "$TAG" --title "$TITLE" --notes "$NOTES" --latest
          fi

  build:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: launcher-windows
            expected_file: ProjectBlackVault-Setup.exe
          - os: macos-latest
            artifact_name: launcher-macos
            expected_file: ProjectBlackVault.dmg
          - os: ubuntu-latest
            artifact_name: launcher-linux
            expected_file: ProjectBlackVault-Setup.AppImage

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: launcher/package-lock.json

      - name: Install launcher dependencies
        run: npm ci
        working-directory: launcher

      - name: Build installer (no publish)
        run: npm run build
        working-directory: launcher

      - name: Validate expected installer
        shell: bash
        run: |
          FILE="launcher/dist/${{ matrix.expected_file }}"
          if [ ! -f "$FILE" ]; then
            echo "Expected installer missing: $FILE"
            echo "Available dist output:"
            ls -la launcher/dist || true
            exit 1
          fi

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: launcher/dist/${{ matrix.expected_file }}
          if-no-files-found: error

  publish:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Download built installers
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Show downloaded installers
        run: |
          find release-assets -type f -maxdepth 3 | sort

      - name: Upload installers to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          files: |
            release-assets/**/ProjectBlackVault-Setup.exe
            release-assets/**/ProjectBlackVault.dmg
            release-assets/**/ProjectBlackVault-Setup.AppImage
          fail_on_unmatched_files: true

      - name: Validate release assets
        run: |
          TAG="${{ needs.prepare.outputs.tag }}"
          ASSETS_FILE="$(mktemp)"
          gh release view "$TAG" --json assets --jq '.assets[].name' > "$ASSETS_FILE"

          REQUIRED=(
            "ProjectBlackVault-Setup.exe"
            "ProjectBlackVault.dmg"
            "ProjectBlackVault-Setup.AppImage"
          )

          for asset in "${REQUIRED[@]}"; do
            if ! grep -Fxq "$asset" "$ASSETS_FILE"; then
              echo "Missing required release asset: $asset"
              echo "Current assets:"
              cat "$ASSETS_FILE" || true
              exit 1
            fi
          done

          echo "Release assets validated successfully."
