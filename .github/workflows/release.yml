name: Build & Release Launcher

on:
  release:
    types: [created]

permissions:
  contents: write  # Required to upload assets to the GitHub Release

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: launcher/package-lock.json

      - name: Install launcher dependencies
        run: npm ci
        working-directory: launcher

      - name: Build and publish installer
        run: npm run dist
        working-directory: launcher
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
