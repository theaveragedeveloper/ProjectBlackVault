name: Build & Release Launcher

on:
  push:
    branches: [main]
    paths:
      - 'launcher/**'
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write  # Required to upload assets to the GitHub Release

jobs:
  prepare:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create or refresh GitHub release
        run: |
          VERSION=$(node -p "require('./launcher/package.json').version")
          TAG="v${VERSION}"
          gh release delete "$TAG" --yes --cleanup-tag 2>/dev/null || true
          gh release create "$TAG" \
            --title "ProjectBlackVault Launcher ${TAG}" \
            --notes "Desktop launcher for ProjectBlackVault. Requires Docker Desktop." \
            --latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: launcher/package-lock.json

      - name: Install launcher dependencies
        run: npm ci
        working-directory: launcher

      - name: Build and publish installer
        run: npm run dist
        working-directory: launcher
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
