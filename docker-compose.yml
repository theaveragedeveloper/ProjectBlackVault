services:
  blackvault:
    build:
      context: .
    image: projectblackvault:v1
    container_name: projectblackvault
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    ports:
      - "${BIND_ADDRESS:-127.0.0.1}:${PORT:-3000}:${PORT:-3000}"
    environment:
      - NODE_ENV=production
      - PORT=${PORT:-3000}
      - BIND_ADDRESS=${BIND_ADDRESS:-127.0.0.1}
      - DATABASE_URL=file:/app/data/vault.db
      - IMAGE_UPLOAD_DIR=/app/uploads
      - SESSION_COOKIE_SECURE=${SESSION_COOKIE_SECURE:-auto}
      - VAULT_ENCRYPTION_KEY=${VAULT_ENCRYPTION_KEY:-}
      - ALLOW_ENCRYPTION_KEY_EXPORT=${ALLOW_ENCRYPTION_KEY_EXPORT:-false}
      - SESSION_SECRET=${SESSION_SECRET:-}
    volumes:
      - ${DATA_DIR:-./data}/db:/app/data
      - ${DATA_DIR:-./data}/uploads:/app/uploads
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- \"http://127.0.0.1:${PORT:-3000}/api/health\" >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
