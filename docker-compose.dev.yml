version: '3.8'

# Development compose — builds image from local source.
# Usage: docker compose -f docker-compose.dev.yml up --build

services:
  blackvault:
    build: .
    container_name: blackvault-dev
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:/app/data/vault.db
    volumes:
      - blackvault-dev-db:/app/data
      - blackvault-dev-uploads:/app/uploads
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  blackvault-dev-db:
  blackvault-dev-uploads:
