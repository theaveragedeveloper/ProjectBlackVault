services:
  blackvault:
    build: .
    image: projectblackvault:dev
    container_name: projectblackvault-dev
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:/app/data/vault.db
      - IMAGE_UPLOAD_DIR=/app/uploads
    volumes:
      - ${DATA_DIR:-./data-dev}/db:/app/data
      - ${DATA_DIR:-./data-dev}/uploads:/app/uploads
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
