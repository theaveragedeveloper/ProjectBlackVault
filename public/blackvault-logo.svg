<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="bv-title bv-desc">
  <title id="bv-title">BlackVault logo</title>
  <desc id="bv-desc">Blue hexagonal padlock emblem</desc>

  <defs>
    <!-- Glow filter for the logo strokes -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <!-- Outer glow for the full logo -->
    <filter id="outerGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feFlood flood-color="#0088FF" flood-opacity="0.35" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Gradient for main strokes -->
    <linearGradient id="strokeGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00BFFF"/>
      <stop offset="100%" stop-color="#0066FF"/>
    </linearGradient>
  </defs>

  <g filter="url(#outerGlow)">
    <!-- Shackle: hexagonal arch -->
    <path d="M200 230 L200 148 L214 120 L256 96 L298 120 L312 148 L312 230"
          stroke="url(#strokeGrad)" stroke-width="20" stroke-linecap="square" stroke-linejoin="miter" fill="none"/>

    <!-- Outer hexagon body -->
    <polygon points="256,150 404,235 404,405 256,490 108,405 108,235"
             stroke="url(#strokeGrad)" stroke-width="20" stroke-linejoin="miter" fill="none"/>

    <!-- Middle concentric hexagon -->
    <polygon points="256,205 371,267.5 371,372.5 256,435 141,372.5 141,267.5"
             stroke="url(#strokeGrad)" stroke-width="16" stroke-linejoin="miter" fill="none" opacity="0.85"/>

    <!-- Inner concentric hexagon -->
    <polygon points="256,250 326,290.5 326,369.5 256,410 186,369.5 186,290.5"
             stroke="url(#strokeGrad)" stroke-width="14" stroke-linejoin="miter" fill="none" opacity="0.7"/>

    <!-- @ symbol — outer ring -->
    <circle cx="256" cy="330" r="38" stroke="url(#strokeGrad)" stroke-width="14" fill="none"/>
    <!-- @ symbol — inner dot -->
    <circle cx="256" cy="330" r="16" stroke="url(#strokeGrad)" stroke-width="12" fill="none"/>
    <!-- @ symbol — tail -->
    <line x1="294" y1="330" x2="294" y2="368" stroke="url(#strokeGrad)" stroke-width="14" stroke-linecap="square"/>
  </g>
</svg>
